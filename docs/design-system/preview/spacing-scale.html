<!doctype html>
<html><head><meta charset="utf-8">
<title>Spacing — 4px grid</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .scale { display:flex; align-items:flex-end; gap:14px; }
  .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background: var(--accent-ai-bg); border: 1px solid var(--accent-ai-ring); border-radius: var(--radius-1); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-secondary); }
  .val { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); }
</style>
</head><body>
<div class="card dense">
  <div class="scale">
    <div class="step"><div class="bar" style="width:18px; height:4px"></div><span class="lbl">1</span><span class="val">4</span></div>
    <div class="step"><div class="bar" style="width:18px; height:8px"></div><span class="lbl">2</span><span class="val">8</span></div>
    <div class="step"><div class="bar" style="width:18px; height:12px"></div><span class="lbl">3</span><span class="val">12</span></div>
    <div class="step"><div class="bar" style="width:18px; height:16px"></div><span class="lbl">4</span><span class="val">16</span></div>
    <div class="step"><div class="bar" style="width:18px; height:24px"></div><span class="lbl">5</span><span class="val">24</span></div>
    <div class="step"><div class="bar" style="width:18px; height:32px"></div><span class="lbl">6</span><span class="val">32</span></div>
    <div class="step"><div class="bar" style="width:18px; height:48px"></div><span class="lbl">7</span><span class="val">48</span></div>
    <div class="step"><div class="bar" style="width:18px; height:64px"></div><span class="lbl">8</span><span class="val">64</span></div>
    <div class="step"><div class="bar" style="width:18px; height:80px"></div><span class="lbl">9</span><span class="val">96</span></div>
  </div>
  <span class="mono-sm fg-tertiary">4px base grid · card padding default 24 (--space-5) · dense data rows 8 (--space-2)</span>
</div>
</body></html>
