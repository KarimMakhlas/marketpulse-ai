<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Backgrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .swatch {
    flex: 1; height: 92px; border-radius: var(--radius-2);
    padding: 12px; box-sizing: border-box;
    display: flex; flex-direction: column; justify-content: space-between;
    border: 1px solid var(--border-subtle);
  }
  .swatch .name { font-family: var(--font-mono); font-size: 12px; color: var(--fg-primary); font-weight: 500; }
  .swatch .hex  { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); }
</style>
</head><body>
<div class="card dense">
  <div class="row" style="gap:8px">
    <div class="swatch" style="background:#07090C"><span class="name">bg-base</span><span class="hex">#07090C</span></div>
    <div class="swatch" style="background:#0A0D12"><span class="name">bg-inset</span><span class="hex">#0A0D12</span></div>
    <div class="swatch" style="background:#0D1117"><span class="name">bg-elevated</span><span class="hex">#0D1117</span></div>
    <div class="swatch" style="background:#11151B"><span class="name">bg-card</span><span class="hex">#11151B</span></div>
    <div class="swatch" style="background:#161B24"><span class="name">bg-card-hover</span><span class="hex">#161B24</span></div>
  </div>
  <span class="mono-sm fg-tertiary">Near-black ramp with a faint cool tint. Never pure #000 — preserves OLED anti-aliasing.</span>
</div>
</body></html>
