<!doctype html>
<html><head><meta charset="utf-8">
<title>Type — Eyebrow & Labels</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
</head><body>
<div class="card">
  <div class="row" style="gap:32px">
    <span class="eyebrow">Sources</span>
    <span class="eyebrow" style="color: var(--accent-ai)">LLMOps</span>
    <span class="eyebrow" style="color: var(--accent-signal)">Live</span>
    <span class="eyebrow" style="color: var(--accent-caution)">Caution</span>
    <span class="eyebrow" style="color: var(--accent-loss)">Critical</span>
  </div>
  <div class="row" style="gap:24px; align-items:baseline">
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--accent-ai); font-weight:600">ROUTER</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--accent-ai); font-weight:600">RETRIEVAL</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--accent-ai); font-weight:600">CRITIQUE</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--accent-ai); font-weight:600">SYNTHESIS</span>
    <span style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em; color:var(--accent-ai); font-weight:600">GRADER</span>
  </div>
  <span class="mono-sm fg-tertiary" style="margin-top:auto">Eyebrow 11/14 · UPPER · +0.08em · semibold &nbsp;·&nbsp; Agent labels: mono 11px · +0.12em</span>
</div>
</body></html>
