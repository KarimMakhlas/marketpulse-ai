<!doctype html>
<html><head><meta charset="utf-8">
<title>Kafka pipeline</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .pipe { display: flex; align-items: center; gap: 0; }
  .topic {
    flex: 1;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-1);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 4px;
    font-family: var(--font-mono);
    position: relative;
  }
  .topic .name { font-size: 12px; color: var(--accent-info); font-weight: 600; }
  .topic .num { font-size: 14px; color: var(--fg-primary); font-variant-numeric: tabular-nums; }
  .topic .rate { font-size: 10px; color: var(--fg-tertiary); }
  .arrow {
    width: 24px; flex-shrink: 0;
    color: var(--accent-info);
    display: flex; align-items: center; justify-content: center;
  }
  .sink {
    flex: 1;
    background: var(--accent-info-bg);
    border: 1px solid var(--accent-info-ring);
    border-radius: var(--radius-1);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 4px;
    font-family: var(--font-mono);
  }
  .sink .name { font-size: 12px; color: var(--accent-info); font-weight: 600; }
  .sink .num { font-size: 14px; color: var(--fg-primary); font-variant-numeric: tabular-nums; }
</style>
</head><body>
<div class="card dense">
  <div class="pipe">
    <div class="topic">
      <span class="name">raw.articles</span>
      <span class="num">52,430</span>
      <span class="rate">↑ 47/s</span>
    </div>
    <div class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
    <div class="topic">
      <span class="name">clean.articles</span>
      <span class="num">52,408</span>
      <span class="rate">↑ 47/s · 0.04% drop</span>
    </div>
    <div class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
    <div class="topic">
      <span class="name">embedded.articles</span>
      <span class="num">52,401</span>
      <span class="rate">↑ 46/s</span>
    </div>
    <div class="arrow"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 6l6 6-6 6"/></svg></div>
    <div class="sink">
      <span class="name">ChromaDB</span>
      <span class="num">52,401</span>
    </div>
  </div>
  <span class="mono-sm fg-tertiary">Ingestion pipeline — Kafka topics flowing into the vector store. Topic pills tint blue (info).</span>
</div>
</body></html>
