<!doctype html>
<html><head><meta charset="utf-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .field {
    display: flex; align-items: center; gap: 10px;
    height: 36px; padding: 0 12px;
    background: var(--bg-inset);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-1);
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--fg-primary);
    transition: border-color var(--dur-snap) var(--ease-out);
  }
  .field:hover { border-color: var(--border-default); }
  .field.focus { border-color: var(--accent-ai); box-shadow: 0 0 0 2px var(--accent-ai-bg); }
  .field .ico { color: var(--fg-tertiary); display:flex; }
  .field .ph { color: var(--fg-muted); flex: 1; }
  .field .val { flex: 1; }
  .field .kbd { font-family: var(--font-mono); font-size: 11px; color: var(--fg-tertiary); padding: 1px 5px; border: 1px solid var(--border-subtle); border-radius: 3px; background: var(--bg-card); }
</style>
</head><body>
<div class="card dense">
  <div class="field">
    <span class="ico"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M21 21l-4.3-4.3"/><circle cx="11" cy="11" r="7"/></svg></span>
    <span class="ph">Ask: "Did NVIDIA beat earnings expectations?"</span>
    <span class="kbd">⌘K</span>
  </div>
  <div class="field focus">
    <span class="ico fg-ai"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg></span>
    <span class="val">How did analysts react to NVIDIA's latest guidance?</span>
    <span style="display:inline-block; width:2px; height:14px; background:var(--accent-ai)"></span>
  </div>
  <div class="row" style="gap:8px">
    <div class="field" style="height:28px; padding:0 10px; font-size:12px; flex:1">
      <span class="ph">Filter by trace ID, source, or query…</span>
    </div>
    <div class="field" style="height:28px; padding:0 10px; font-size:12px; width:180px">
      <span class="val mono-sm">last 24h</span>
      <span class="ico"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg></span>
    </div>
  </div>
</div>
</body></html>
