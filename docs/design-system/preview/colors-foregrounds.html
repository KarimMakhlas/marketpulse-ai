<!doctype html>
<html><head><meta charset="utf-8">
<title>Colors — Foregrounds</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .fg-row {
    display: grid;
    grid-template-columns: 200px 140px 1fr;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--border-row);
  }
  .fg-row:last-child { border-bottom: none; }
  .fg-row .sample { font-size: 16px; font-weight: 500; letter-spacing: -0.01em; }
  .fg-row .token  { font-family: var(--font-mono); font-size: 12px; color: var(--fg-tertiary); }
  .fg-row .hex    { font-family: var(--font-mono); font-size: 12px; color: var(--fg-muted); }
</style>
</head><body>
<div class="card dense">
  <div class="fg-row"><span class="sample" style="color:#E8EAED">Primary text · 0.89</span><span class="token">--fg-primary</span><span class="hex">#E8EAED</span></div>
  <div class="fg-row"><span class="sample" style="color:#9CA3AF">Secondary text · labels</span><span class="token">--fg-secondary</span><span class="hex">#9CA3AF</span></div>
  <div class="fg-row"><span class="sample" style="color:#6B7280">Tertiary · axis labels</span><span class="token">--fg-tertiary</span><span class="hex">#6B7280</span></div>
  <div class="fg-row"><span class="sample" style="color:#5B6473">Muted · placeholder</span><span class="token">--fg-muted</span><span class="hex">#5B6473</span></div>
</div>
</body></html>
