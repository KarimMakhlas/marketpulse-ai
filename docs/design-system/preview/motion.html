<!doctype html>
<html><head><meta charset="utf-8">
<title>Motion</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .token-row {
    display: grid;
    grid-template-columns: 180px 160px 1fr;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--border-row);
  }
  .token-row:last-child { border-bottom: none; }
  .tok { font-family: var(--font-mono); font-size: 12px; color: var(--fg-primary); }
  .val { font-family: var(--font-mono); font-size: 12px; color: var(--fg-secondary); }
  .use { font-size: 12px; color: var(--fg-tertiary); }
  @keyframes blink { 50% { opacity: 0; } }
  .cursor { display:inline-block; width:6px; height:14px; background: var(--accent-ai); animation: blink 1.06s steps(2) infinite; vertical-align: -2px; margin-left: 2px; }
</style>
</head><body>
<div class="card dense">
  <div class="token-row">
    <span class="tok">--dur-snap</span><span class="val">150ms</span><span class="use">Hover · focus · pill change · button</span>
  </div>
  <div class="token-row">
    <span class="tok">--dur-base</span><span class="val">240ms</span><span class="use">KPI number crossfade · panel reveal</span>
  </div>
  <div class="token-row">
    <span class="tok">--ease-out</span><span class="val">cubic(.2,0,0,1)</span><span class="use">Snap-out — the only easing in the system</span>
  </div>
  <div class="token-row">
    <span class="tok">cursor blink</span><span class="val">1.06s steps(2)</span><span class="use">Streaming token cursor<span class="cursor"></span></span>
  </div>
</div>
</body></html>
