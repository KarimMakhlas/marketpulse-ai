<!doctype html>
<html><head><meta charset="utf-8">
<title>Source Marks</title>
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }
  .mark {
    height: 56px;
    background: var(--bg-card);
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-2);
    display: flex; align-items: center; justify-content: center;
    color: var(--fg-primary);
    opacity: 0.7;
  }
  .mark img { max-height: 18px; }
  .mark.large img { max-height: 22px; }
</style>
</head><body>
<div class="card dense">
  <div class="grid">
    <div class="mark"><img src="../assets/icons/source-reuters.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark"><img src="../assets/icons/source-bloomberg.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark large"><img src="../assets/icons/source-ft.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark"><img src="../assets/icons/source-wsj.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark large"><img src="../assets/icons/source-yahoo.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark"><img src="../assets/icons/source-sec.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark"><img src="../assets/icons/source-reddit.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark"><img src="../assets/icons/source-x.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark"><img src="../assets/icons/source-newsapi.svg" alt="" style="filter: invert(1) brightness(0.95);"></div>
    <div class="mark" style="border-style: dashed; opacity: 0.4;"><span class="mono-sm fg-tertiary">+ add</span></div>
  </div>
  <span class="mono-sm fg-tertiary">Flat monogram marks at 70% fg opacity. Color logos are off-brand inside the app.</span>
</div>
</body></html>
