<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=1440">
  <title>MarketPulse AI · LLMOps Platform</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="ui-kit.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Live backend client (plain JS, loaded before the Babel components). -->
  <script src="api.js"></script>

  <!-- Shared UI kit, split by concern. Load order = dependency order:
       primitives -> charts -> cards -> shell (each references the prior). -->
  <script type="text/babel" src="primitives.jsx" data-presets="react"></script>
  <script type="text/babel" src="charts.jsx" data-presets="react"></script>
  <script type="text/babel" src="cards.jsx" data-presets="react"></script>
  <script type="text/babel" src="shell.jsx" data-presets="react"></script>

  <script type="text/babel" src="Dashboard.jsx" data-presets="react"></script>
  <script type="text/babel" src="QueryConsole.jsx" data-presets="react"></script>
  <script type="text/babel" src="Monitoring.jsx" data-presets="react"></script>
  <script type="text/babel" src="DataSources.jsx" data-presets="react"></script>
  <script type="text/babel" src="QueryHistory.jsx" data-presets="react"></script>
  <script type="text/babel" src="Settings.jsx" data-presets="react"></script>
  <script type="text/babel" src="App.jsx" data-presets="react"></script>
</body>
</html>
